<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>My Linguistics Apps</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f1f3f6;
        color: #20242a;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(900px, calc(100% - 32px));
        margin: 50px auto;
      }

      header {
        margin-bottom: 32px;
      }

      h1 {
        margin-bottom: 8px;
        font-size: 38px;
      }

      header p {
        margin: 0;
        color: #5c6470;
        font-size: 17px;
      }

      .app-grid {
        display: grid;
        grid-template-columns:
          repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }

      .app-card {
        display: block;
        padding: 24px;
        color: inherit;
        text-decoration: none;
        background: white;
        border: 1px solid #d9dde4;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }

      .app-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.1);
      }

      .app-card h2 {
        margin: 0 0 10px;
        font-size: 21px;
      }

      .app-card p {
        margin: 0;
        color: #5c6470;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <main>
      <header>
        <h1>My Linguistics Apps</h1>
        <p>Select an app to open it.</p>
      </header>

      <section class="app-grid">
        <a
          class="app-card"
          href="/ipa-feature-trainer/"
        >
          <h2>IPA Feature Trainer</h2>

          <p>
            Practise distinctive features and place nodes
            for English speech sounds.
          </p>
        </a>
      </section>
    </main>
  </body>
</html>
